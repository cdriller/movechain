name: Build

# Compile contracts, build the frontend, and render the poster PDF.
# Runs on pull requests (downloadable artifacts) and on every push to main.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('build-pr-{0}', github.event.pull_request.number) || 'build-main' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Use HTTPS for GitHub git dependencies
        run: git config --global url."https://github.com/".insteadOf ssh://git@github.com/
      - run: npm ci
      - run: npm run compile
      - uses: typst-community/setup-typst@v4
        with:
          cache-typst-packages: true
      - name: Render poster PDF
        working-directory: poster
        run: typst compile movechain-poster.typ
      - run: npm --prefix frontend ci
      - name: Build frontend
        env:
          VITE_MOVECHAIN_ADDRESS: ${{ vars.MOVECHAIN_ADDRESS }}
        run: npm --prefix frontend run build:sepolia
      - name: Bundle artifacts
        run: |
          mkdir -p ci-artifacts/contracts ci-artifacts/frontend ci-artifacts/poster
          cp artifacts/contracts/MoveChain.sol/MoveChain.json ci-artifacts/contracts/
          cp artifacts/contracts/TripCredits.sol/TripCredits.json ci-artifacts/contracts/
          cp -a frontend/dist/. ci-artifacts/frontend/
          cp poster/movechain-poster.pdf ci-artifacts/poster/
          printf '{"sha":"%s","ref":"%s","event":"%s"}\n' \
            "${{ github.sha }}" "${{ github.ref }}" "${{ github.event_name }}" \
            > ci-artifacts/manifest.json
      - uses: actions/upload-artifact@v4
        with:
          name: movechain-artifacts
          path: ci-artifacts/
          retention-days: 30
