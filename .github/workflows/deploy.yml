name: Deploy (Sepolia + Vercel)

# main = the currently deployed state. On every push to main:
#   1. compile + test
#   2. detect whether MoveChain / TripCredits bytecode changed
#   3. deploy contracts to Sepolia ONLY if they changed
#        - MoveChain change       -> redeploy MoveChain (automatic)
#        - TripCredits change      -> full redeploy (automatic; wipes balances)
#   4. always rebuild + deploy the frontend to Vercel with the current address
#
# The "current deployed state" is persisted in GitHub repository VARIABLES
# (not committed back to git, so the GitLab->GitHub mirror is never disturbed):
#   MOVECHAIN_ADDRESS, TRIPCREDITS_ADDRESS,
#   MOVECHAIN_BYTECODE_HASH, TRIPCREDITS_BYTECODE_HASH

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Use HTTPS for GitHub git dependencies
        run: git config --global url."https://github.com/".insteadOf ssh://git@github.com/
      - run: npm ci
      - run: npm test

  detect:
    runs-on: ubuntu-latest
    outputs:
      movechain_changed: ${{ steps.diff.outputs.movechain_changed }}
      tripcredits_changed: ${{ steps.diff.outputs.tripcredits_changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Use HTTPS for GitHub git dependencies
        run: git config --global url."https://github.com/".insteadOf ssh://git@github.com/
      - run: npm ci
      - run: npx hardhat compile
      - id: diff
        env:
          PREV_MOVECHAIN_HASH: ${{ vars.MOVECHAIN_BYTECODE_HASH }}
          PREV_TRIPCREDITS_HASH: ${{ vars.TRIPCREDITS_BYTECODE_HASH }}
          MOVECHAIN_ADDRESS: ${{ vars.MOVECHAIN_ADDRESS }}
          TRIPCREDITS_ADDRESS: ${{ vars.TRIPCREDITS_ADDRESS }}
        run: |
          mc_hash="$(node scripts/ci-hash.mjs MoveChain)"
          tc_hash="$(node scripts/ci-hash.mjs TripCredits)"
          echo "MoveChain    hash: $mc_hash (prev: ${PREV_MOVECHAIN_HASH:-none})"
          echo "TripCredits  hash: $tc_hash (prev: ${PREV_TRIPCREDITS_HASH:-none})"

          mc_changed=false
          tc_changed=false
          if [ -z "$MOVECHAIN_ADDRESS" ] || [ "$mc_hash" != "$PREV_MOVECHAIN_HASH" ]; then
            mc_changed=true
          fi
          if [ -z "$TRIPCREDITS_ADDRESS" ] || [ "$tc_hash" != "$PREV_TRIPCREDITS_HASH" ]; then
            tc_changed=true
          fi

          echo "movechain_changed=$mc_changed" >> "$GITHUB_OUTPUT"
          echo "tripcredits_changed=$tc_changed" >> "$GITHUB_OUTPUT"
          echo "Decision: movechain_changed=$mc_changed tripcredits_changed=$tc_changed"

  # Full redeploy (new TripCredits => all rider balances reset). Runs
  # automatically whenever TripCredits.sol changes. NOTE: this is destructive —
  # to re-introduce a manual approval later, add `environment: sepolia-tripcredits`
  # here and configure a required reviewer on that environment.
  deploy-tripcredits:
    needs: [test, detect]
    if: ${{ needs.detect.outputs.tripcredits_changed == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    outputs:
      movechain_address: ${{ steps.deploy.outputs.movechain_address }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Use HTTPS for GitHub git dependencies
        run: git config --global url."https://github.com/".insteadOf ssh://git@github.com/
      - run: npm ci
      - id: deploy
        env:
          SEPOLIA_PRIVATE_KEY: ${{ secrets.SEPOLIA_PRIVATE_KEY }}
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: node scripts/ci-deploy.mjs --mode full
      - name: Persist deployed state to repo variables
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh variable set MOVECHAIN_ADDRESS --body "${{ steps.deploy.outputs.movechain_address }}"
          gh variable set TRIPCREDITS_ADDRESS --body "${{ steps.deploy.outputs.tripcredits_address }}"
          gh variable set MOVECHAIN_BYTECODE_HASH --body "${{ steps.deploy.outputs.movechain_hash }}"
          gh variable set TRIPCREDITS_BYTECODE_HASH --body "${{ steps.deploy.outputs.tripcredits_hash }}"

  # Automatic MoveChain-only redeploy against the existing TripCredits.
  deploy-movechain:
    needs: [test, detect]
    if: ${{ needs.detect.outputs.movechain_changed == 'true' && needs.detect.outputs.tripcredits_changed == 'false' }}
    runs-on: ubuntu-latest
    environment: production
    outputs:
      movechain_address: ${{ steps.deploy.outputs.movechain_address }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Use HTTPS for GitHub git dependencies
        run: git config --global url."https://github.com/".insteadOf ssh://git@github.com/
      - run: npm ci
      - id: deploy
        env:
          SEPOLIA_PRIVATE_KEY: ${{ secrets.SEPOLIA_PRIVATE_KEY }}
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          TRIPCREDITS_ADDRESS: ${{ vars.TRIPCREDITS_ADDRESS }}
        run: node scripts/ci-deploy.mjs --mode movechain
      - name: Persist deployed state to repo variables
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh variable set MOVECHAIN_ADDRESS --body "${{ steps.deploy.outputs.movechain_address }}"
          gh variable set MOVECHAIN_BYTECODE_HASH --body "${{ steps.deploy.outputs.movechain_hash }}"

  # Always runs (unless an upstream job failed). Builds with the current
  # MoveChain address and ships a prebuilt static deployment to Vercel.
  frontend:
    needs: [detect, deploy-tripcredits, deploy-movechain]
    if: ${{ always() && !cancelled() && !failure() }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Resolve MoveChain address
        id: addr
        run: |
          ADDR="${{ needs.deploy-tripcredits.outputs.movechain_address || needs.deploy-movechain.outputs.movechain_address || vars.MOVECHAIN_ADDRESS }}"
          if [ -z "$ADDR" ]; then
            echo "No MoveChain address available (deploy a contract first)."
            exit 1
          fi
          echo "address=$ADDR" >> "$GITHUB_OUTPUT"
          echo "Building frontend against $ADDR"
      - name: Use HTTPS for GitHub git dependencies
        run: git config --global url."https://github.com/".insteadOf ssh://git@github.com/
      - run: npm ci
      - name: Regenerate frontend ABI from compiled contract
        run: npx hardhat compile && npm run gen:abi
      - name: Install frontend deps
        run: npm --prefix frontend ci
      - name: Build frontend (sepolia mode, injected address)
        env:
          VITE_MOVECHAIN_ADDRESS: ${{ steps.addr.outputs.address }}
        run: npm --prefix frontend run build:sepolia
      - name: Deploy prebuilt static output to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        run: |
          npm i -g vercel@latest
          rm -rf .vercel/output
          mkdir -p .vercel/output/static
          cp -a frontend/dist/. .vercel/output/static/
          printf '{"version":3}' > .vercel/output/config.json
          vercel deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN"
